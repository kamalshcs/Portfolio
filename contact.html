<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Landing Page - Kamalpreet</title>

        <!-- Font Style -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    
    <body>

        <section class="navbar-wrapper">
                <nav>
                    <input type="checkbox" id="nav-toggle" class="nav-toggle">
                    <label for="nav-toggle" class="nav-button">
                    <span></span>
                    </label>

                    <ul class="nav-links">
                        <li><a class="links" href="index.html">Home</a></li>
                        <li><a class="links" href="#about">About</a></li>
                        <li><a class="links" href="#portfolio">Portfolio</a></li>
                        <li><a class="links" href="contact.html">Contact</a></li>
                    </ul>
                </nav>
            </section>

        <section class="glass-card">
            <p class="form-heading">HAVE A PROJECT IN MIND?</p>
            <form method="POST" class="form">
                    <div class="form-group">
                        <label for="user-name">Name</label>
                        <input type="text" id="user-name" name="user_name" placeholder="John Doe" required>
                    </div>

                    <div class="form-group">
                        <label for="user-email">Email</label>
                        <input type="email" id="user-email" name="user_email" placeholder="johndoe@gmail.com" required>
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <select id="subject" name="subject" required>
                            <option value="" disabled selected>Select an option</option>
                            <option value="general">General Inquiry</option>
                            <option value="support">Technical Support</option>
                            <option value="feedback">Feedback</option>
                            <option value="other">Other</option>
                        </select>
                        </div>

                    <div class="form-group">
                        <label for="user-message">Message</label>
                        <textarea id="user-message" name="user_message" rows="5" placeholder="I would like to collaborate on a project!" required></textarea>
                    </div>
                <button class="button" type="submit">Send Message</button>
            </form>
        </section>
        
    </body>

    <script>
        const contactForm = document.querySelector('.form');
        contactForm.addEventListener('submit', function(event) {
            event.preventDefault();
            alert('The form was submitted successfully!');
            contactForm.reset();
        });
    </script>
</html>
